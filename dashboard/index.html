<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAFAFA;
  --card: #FFFFFF;
  --border: #E5E7EB;
  --text: #111827;
  --text-secondary: #6B7280;
  --text-tertiary: #9CA3AF;

  --radius: 8px;

}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Top Bar ── */
.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.topbar-accent {
  width: 4px;

  border-radius: 2px;
  background: var(--accent);
}

.topbar-title {
  font-weight: 600;
  font-size: 15px;
}

.topbar-client {
  font-size: 13px;
  color: var(--text-secondary);
  padding: 2px 8px;
  background: var(--bg);
  border-radius: 4px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 150ms ease;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { filter: brightness(1.1); }

.btn-secondary {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--bg); }

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);

}
.btn-ghost:hover { background: var(--bg); color: var(--text); }

.btn-danger {

}
.btn-danger:hover { background: #FECACA; }

.btn-sm { padding: 4px 10px; font-size: 12px; }

.btn-icon {

  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);

  cursor: pointer;
  color: var(--text-secondary);

}
.btn-icon:hover { background: var(--bg); color: var(--text); }

/* ── Container ── */

<script>
// ══════════════════════════════════════════════════════════════
// Config
// ══════════════════════════════════════════════════════════════
const CLIENT = {
  key: 'wio',
  name: 'WiO SmartFoods',
  repo: 'ppcjoel/wio-advertorial-pages',
  domain: 'nutritionsciencedaily.com',
  color: '#E85D04',
  sevallaSiteId: 'eea01bda-5c9c-48f5-a05b-38372cda1d90'
};

async function triggerDeploy() {
  const apiKey = localStorage.getItem('sevalla_key');
  if (!apiKey || !CLIENT.sevallaSiteId) return;
  try {
    const res = await fetch('https://api.sevalla.com/v2/static-sites/deployments', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ static_site_id: CLIENT.sevallaSiteId, branch: 'main' })
    });
    if (res.ok) toast('Deploy triggered');
    else toast('Deploy failed');
  } catch { toast('Deploy error'); }
}

// ══════════════════════════════════════════════════════════════
// Site API — reads from deployed site (no auth needed)
// ══════════════════════════════════════════════════════════════
const SiteAPI = {
  async listTests() {
    try {
      const res = await fetch('/tests/_index.json');
      if (!res.ok) return null;
      const names = await res.json();
      const tests = [];
      for (const name of names) {
        try {
          const r = await fetch(`/tests/${name}.json`);
          if (r.ok) tests.push(await r.json());
        } catch {}
      }
      return tests;
    } catch { return null; }
  }
};

// ══════════════════════════════════════════════════════════════
// GitHub API — used for write operations (requires PAT)
// ══════════════════════════════════════════════════════════════
const GitHub = {
  token: null,
  repo: null,

  headers() {
    return {
      'Authorization': `token ${this.token}`,
      'Accept': 'application/vnd.github.v3+json'
    };
  },

  async validateToken() {
    try {
      const res = await fetch(`https://api.github.com/repos/${this.repo}`, { headers: this.headers() });
      return res.ok;
    } catch { return false; }
  },

  async listPages() {
    const res = await fetch(`https://api.github.com/repos/${this.repo}/contents/`, { headers: this.headers() });
    if (!res.ok) throw new Error('Failed to list pages');
    const items = await res.json();
    return items.filter(f => f.type === 'file' && f.name.endsWith('.html') && !f.name.startsWith('_')).map(f => f.name);
  },

  async listTests() {
    const res = await fetch(`https://api.github.com/repos/${this.repo}/contents/tests`, { headers: this.headers() });
    if (res.status === 404) return [];
    if (!res.ok) throw new Error('Failed to list tests');
    const files = await res.json();
    const tests = [];
    for (const f of files) {
      if (!f.name.endsWith('.json') || f.name.startsWith('_')) continue;
      const detail = await fetch(f.url, { headers: this.headers() });
      if (!detail.ok) continue;
      const data = await detail.json();
      const content = JSON.parse(atob(data.content));
      content._sha = data.sha;
      tests.push(content);
    }
    return tests;
  },

  async createTest(test) {
    const body = {
      message: `Create test: ${test.display_name}`,
      content: btoa(JSON.stringify(test, null, 2)),
      branch: 'main'
    };
    const res = await fetch(
      `https://api.github.com/repos/${this.repo}/contents/tests/${test.name}.json`,
      { method: 'PUT', headers: { ...this.headers(), 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'Failed to create test');
    }
    return res.json();
  },

  async updateTest(test, sha) {
    const body = {
      message: `Update test: ${test.display_name}`,
      content: btoa(JSON.stringify(test, null, 2)),
      sha,
      branch: 'main'
    };
    const res = await fetch(
      `https://api.github.com/repos/${this.repo}/contents/tests/${test.name}.json`,
      { method: 'PUT', headers: { ...this.headers(), 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );
    if (!res.ok) throw new Error('Failed to update test');
    const data = await res.json();
    return data.content.sha;
  },

  async deleteTest(name, sha) {
    const body = { message: `Delete test: ${name}`, sha, branch: 'main' };
    const res = await fetch(
      `https://api.github.com/repos/${this.repo}/contents/tests/${name}.json`,
      { method: 'DELETE', headers: { ...this.headers(), 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );
    if (!res.ok) throw new Error('Failed to delete test');
  },

  async updateIndex(testNames) {
    let sha;
    try {
      const res = await fetch(`https://api.github.com/repos/${this.repo}/contents/tests/_index.json`, { headers: this.headers() });
      if (res.ok) sha = (await res.json()).sha;
    } catch {}
    const body = {
      message: 'Update test index',
      content: btoa(JSON.stringify(testNames, null, 2)),
      branch: 'main'
    };
    if (sha) body.sha = sha;
    await fetch(`https://api.github.com/repos/${this.repo}/contents/tests/_index.json`, {
      method: 'PUT',
      headers: { ...this.headers(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  }
};

// UTM Generator

const UTM = {
  baseUrl(domain, page) {
    return `https://${domain}/${page}`;
  },
  taboola(url) {
    return `${url}?utm_source=taboola&utm_medium=paid&utm_campaign={campaign_name}&utm_content={title}&utm_term={site}`;
  },
  outbrain(url) {
    return `${url}?utm_source=outbrain&utm_medium=paid&utm_campaign={{campaign_name}}&utm_content={{ad_title}}&utm_term={{publisher_name}}_{{section_name}}`;
  }
};

function $(sel) { return document.querySelector(sel); }
function toast(msg) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    toast('Copied!');
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('Copied!');
  }
}

function variantLetter(i) {
  return String.fromCharCode(97 + i);
}

function client() {
  return CLIENT;
}

function formatTimestamp(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  if (isNaN(d.getTime())) return ts;
  const month = d.toLocaleString('en-US', { month: 'short' });
  const day = d.getDate();
  const year = d.getFullYear();
  // If it's just a date (no time component), show date only
  if (typeof ts === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(ts)) {
    return `${month} ${day}, ${year}`;
  }
  const time = d.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  return `${month} ${day}, ${year} ${time}`;
}

function nowISO() {
  return new Date().toISOString();
}

// Prompt for PAT when a write operation is needed
function ensureToken() {
  return new Promise((resolve) => {
    // Already have a token
    if (GitHub.token) { resolve(true); return; }
    // Try localStorage
    const saved = localStorage.getItem('gh_token');
    if (saved) {
      GitHub.token = saved;
      GitHub.repo = CLIENT.repo;
      State.readOnly = false;
      resolve(true);
      return;
    }
    // Show inline token prompt
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = `
      <div class="confirm-box" style="max-width:440px;">
        <h3>GitHub Token Required</h3>
        <p>This action writes to the repo. Enter a GitHub PAT with <code>repo</code> scope.</p>
        <input type="password" class="form-input" id="token-prompt-input" placeholder="ghp_..." style="margin-bottom:12px;">
        <div id="token-prompt-error" style="color:#991B1B; font-size:12px; margin-bottom:8px; display:none;"></div>
        <div class="confirm-box-actions">
          <button class="btn btn-secondary" id="token-prompt-cancel">Cancel</button>
          <button class="btn btn-primary" id="token-prompt-save">Connect</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const input = overlay.querySelector('#token-prompt-input');
    input.focus();
    overlay.querySelector('#token-prompt-cancel').onclick = () => { overlay.remove(); resolve(false); };
    overlay.querySelector('#token-prompt-save').onclick = async () => {
      const token = input.value.trim();
      const errEl = overlay.querySelector('#token-prompt-error');
      if (!token) { errEl.textContent = 'Enter a token.'; errEl.style.display = 'block'; return; }
      overlay.querySelector('#token-prompt-save').textContent = 'Validating...';
      overlay.querySelector('#token-prompt-save').disabled = true;
      GitHub.token = token;
      GitHub.repo = CLIENT.repo;
      const valid = await GitHub.validateToken();
      if (!valid) {
        errEl.textContent = 'Could not access the repo. Check your token.';
        errEl.style.display = 'block';
        GitHub.token = null;
        overlay.querySelector('#token-prompt-save').textContent = 'Connect';
        overlay.querySelector('#token-prompt-save').disabled = false;
        return;
      }
      localStorage.setItem('gh_token', token);
      State.readOnly = false;
      overlay.remove();
      resolve(true);
    };
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') overlay.querySelector('#token-prompt-save').click();
    });
  });
}

function render() {

  }

  switch (State.view) {

      app.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';

    case 'settings':
      renderSettings(app);
      break;
    case 'dashboard':
      renderDashboard(app);
      break;
    case 'detail':
      renderDetail(app);
      break;
  }
}

// ── Dashboard ──
async function loadDashboard() {
  State.view = 'loading';
  render();
  try {
    if (GitHub.token) {
      // Full mode: use GitHub API (shows unpublished changes)
      const [tests, pages] = await Promise.all([GitHub.listTests(), GitHub.listPages()]);
      State.tests = tests;
      State.pages = pages;
      State.readOnly = false;
    } else {
      // Read-only: fetch from deployed site
      const tests = await SiteAPI.listTests();
      State.tests = tests || [];
      State.pages = [];
    }
    State.view = 'dashboard';
  } catch (e) {
    State.view = 'dashboard';
    State.tests = [];
    State.pages = [];
    console.error(e);
  }
  render();
}

    e.target.className = `status-select ${newStatus}`;
    try {
      const cleanTest = { ...t };
      const sha = cleanTest._sha;
      delete cleanTest._sha;
      const newSha = await GitHub.updateTest(cleanTest, sha);
      t._sha = newSha;
      toast(`Status updated to ${newStatus}`);
      triggerDeploy();
    } catch (err) {
      toast('Failed to update status');
      t.status = oldStatus;
      e.target.value = oldStatus;
      e.target.className = `status-select ${oldStatus}`;
      console.error(err);
    }
  };

  // Delete
  $('#btn-delete').onclick = async () => {
    const hasToken = await ensureToken();
    if (!hasToken) return;

    // If we loaded read-only, we need the sha from GitHub
    if (!t._sha) {
      try {
        const res = await fetch(`https://api.github.com/repos/${GitHub.repo}/contents/tests/${t.name}.json`, { headers: GitHub.headers() });
        if (res.ok) t._sha = (await res.json()).sha;
      } catch {}
    }

    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = `
      <div class="confirm-box">
        <h3>Delete "${t.display_name}"?</h3>
        <p>This will remove the test config from the repo. The advertorial pages themselves will not be affected.</p>
        <div class="confirm-box-actions">
          <button class="btn btn-secondary" id="confirm-cancel">Cancel</button>
          <button class="btn btn-danger" id="confirm-delete">Delete Test</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    overlay.querySelector('#confirm-cancel').onclick = () => overlay.remove();
    overlay.querySelector('#confirm-delete').onclick = async () => {
      overlay.remove();
      try {
        await GitHub.deleteTest(t.name, t._sha);
        // Update the index
        const remaining = State.tests.filter(x => x.name !== t.name).map(x => x.name);
        await GitHub.updateIndex(remaining);
        toast('Test deleted');
        triggerDeploy();
        await loadDashboard();
      } catch (err) {
        toast('Failed to delete test');
        console.error(err);
      }
    };
  };
}

// ── New Test Modal ──
function openNewTestModal() {
  const modal = $('#modal-root');
  let variantCount = 2;

  function getVariantRowsHTML(count) {
    const defaultWeight = Math.floor(100 / count);
    const remainder = 100 - (defaultWeight * count);
    let html = '';
    for (let i = 0; i < count; i++) {
      const w = defaultWeight + (i === 0 ? remainder : 0);
      html += `
        <div class="variant-row">
          <div class="variant-letter">${variantLetter(i).toUpperCase()}</div>
          <select class="form-select variant-page-select">
            <option value="">Select a page...</option>
            ${State.pages.map(p => `<option value="${p}">${p}</option>`).join('')}
          </select>
          <input type="number" class="weight-input" min="1" max="99" value="${w}">
          <span class="weight-suffix">%</span>
          ${count > 2 ? `<button class="remove-variant" data-idx="${i}">&times;</button>` : '<div style="width:32px"></div>'}
        </div>
      `;
    }
    html += '<div class="weight-total" id="weight-total"></div>';
    return html;
  }

  function updateWeightTotal() {
    const weights = modal.querySelectorAll('.weight-input');
    const totalEl = modal.querySelector('#weight-total');
    if (!totalEl) return;
    let sum = 0;
    weights.forEach(w => sum += parseInt(w.value) || 0);
    if (sum === 100) {
      totalEl.textContent = 'Total: 100%';
      totalEl.className = 'weight-total valid';
    } else {
      totalEl.textContent = `Total: ${sum}% (must equal 100%)`;
      totalEl.className = 'weight-total invalid';
    }
  }

  function updatePreview() {
    const name = modal.querySelector('#new-test-name')?.value.trim() || '';
    const selects = modal.querySelectorAll('.variant-page-select');
    const preview = modal.querySelector('#test-id-preview-items');
    if (!preview) return;

    updateWeightTotal();

    if (!name) {
      preview.innerHTML = '<span style="color:var(--text-tertiary); font-size:12px;">Enter a test name to see preview</span>';
      return;
    }

    let html = '';
    selects.forEach((sel, i) => {
      const tid = `${name}_${variantLetter(i)}`;
      html += `<span class="test-id-chip">${tid}</span>`;
    });
    preview.innerHTML = html;
  }

  function renderModal() {
    modal.innerHTML = `
      <div class="modal-overlay open">
        <div class="modal">
          <h2>New Test</h2>

          <div class="form-group">
            <label class="form-label">Test Name (slug)</label>
            <input type="text" class="form-input" id="new-test-name" placeholder="e.g. kbh, muf_cta, pb_angle" autocomplete="off">
            <div class="form-hint">Lowercase, underscores only. This becomes the test_id prefix.</div>
          </div>

          <div class="form-group">
            <label class="form-label">Display Name</label>
            <input type="text" class="form-input" id="new-test-display" placeholder="e.g. Keto Bread Headlines">
          </div>

          <div class="form-group">
            <label class="form-label">Variants</label>
            <div class="variant-rows" id="variant-rows">
              ${getVariantRowsHTML(variantCount)}
            </div>
            <button class="btn btn-secondary btn-sm" style="margin-top:8px;" id="btn-add-variant">+ Add Variant</button>
          </div>

          <div class="test-id-preview">
            <div class="test-id-preview-label">test_id Preview</div>
            <div class="test-id-preview-items" id="test-id-preview-items"></div>
          </div>

          <div id="new-test-error" style="color:#991B1B; font-size:13px; margin-top:12px; display:none;"></div>

          <div class="modal-footer">
            <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
            <button class="btn btn-primary" id="modal-create">Create Test</button>
          </div>
        </div>
      </div>
    `;

    // Events
    modal.querySelector('#modal-cancel').onclick = () => closeModal();
    modal.querySelector('.modal-overlay').onclick = (e) => {
      if (e.target === e.currentTarget) closeModal();
    };

    modal.querySelector('#new-test-name').oninput = (e) => {
      e.target.value = e.target.value.toLowerCase().replace(/[^a-z0-9_]/g, '');
      updatePreview();
    };

    modal.querySelector('#btn-add-variant').onclick = () => {
      variantCount++;
      modal.querySelector('#variant-rows').innerHTML = getVariantRowsHTML(variantCount);
      bindVariantEvents();
      updatePreview();
    };

    modal.querySelector('#modal-create').onclick = createTest;

    bindVariantEvents();
    updatePreview();
  }

  function bindVariantEvents() {
    modal.querySelectorAll('.remove-variant').forEach(btn => {
      btn.onclick = () => {
        variantCount--;
        modal.querySelector('#variant-rows').innerHTML = getVariantRowsHTML(variantCount);
        bindVariantEvents();
        updatePreview();
      };
    });
    modal.querySelectorAll('.variant-page-select').forEach(sel => {
      sel.onchange = updatePreview;
    });
    modal.querySelectorAll('.weight-input').forEach(inp => {
      inp.oninput = updateWeightTotal;
    });
  }

  async function createTest() {
    const name = modal.querySelector('#new-test-name').value.trim();
    const displayName = modal.querySelector('#new-test-display').value.trim();
    const selects = modal.querySelectorAll('.variant-page-select');
    const errEl = modal.querySelector('#new-test-error');

    // Validate
    if (!name) { errEl.textContent = 'Test name is required.'; errEl.style.display = 'block'; return; }
    if (!/^[a-z0-9_]+$/.test(name)) { errEl.textContent = 'Name must be lowercase letters, numbers, and underscores only.'; errEl.style.display = 'block'; return; }
    if (!displayName) { errEl.textContent = 'Display name is required.'; errEl.style.display = 'block'; return; }
    if (State.tests.some(t => t.name === name)) { errEl.textContent = 'A test with this name already exists.'; errEl.style.display = 'block'; return; }

    const weights = modal.querySelectorAll('.weight-input');
    let weightSum = 0;
    weights.forEach(w => weightSum += parseInt(w.value) || 0);
    if (weightSum !== 100) { errEl.textContent = `Traffic weights must total 100% (currently ${weightSum}%).`; errEl.style.display = 'block'; return; }

    const variants = [];
    const usedPages = new Set();
    for (let i = 0; i < selects.length; i++) {
      const page = selects[i].value;
      if (!page) { errEl.textContent = `Select a page for variant ${variantLetter(i).toUpperCase()}.`; errEl.style.display = 'block'; return; }
      if (usedPages.has(page)) { errEl.textContent = `Page "${page}" is used in multiple variants.`; errEl.style.display = 'block'; return; }
      usedPages.add(page);
      variants.push({
        id: variantLetter(i),
        page,
        test_id: `${name}_${variantLetter(i)}`,
        weight: parseInt(weights[i].value),
        added: nowISO()
      });
    }

    errEl.style.display = 'none';
    const createBtn = modal.querySelector('#modal-create');
    createBtn.textContent = 'Creating...';
    createBtn.disabled = true;

    const test = {
      name,
      display_name: displayName,
      client: CLIENT.key,
      status: 'active',
      created: nowISO(),
      variants
    };

    try {
      await GitHub.createTest(test);
      // Update the index with all test names
      const allNames = [...State.tests.map(t => t.name), test.name];
      await GitHub.updateIndex(allNames);
      closeModal();
      toast('Test created!');
      triggerDeploy();
      await loadDashboard();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      createBtn.textContent = 'Create Test';
      createBtn.disabled = false;
    }
  }

  renderModal();

  // Focus name input
  setTimeout(() => modal.querySelector('#new-test-name')?.focus(), 100);
}

// ── Add Variant Modal ──
function openAddVariantModal(test) {
  const modal = $('#modal-root');
  const existingPages = new Set(test.variants.map(v => v.page));
  const nextLetter = variantLetter(test.variants.length);

  modal.innerHTML = `
    <div class="modal-overlay open">
      <div class="modal">
        <h2>Add Variant to "${test.display_name}"</h2>
        <p style="font-size:13px; color:var(--text-secondary); margin-bottom:16px;">
          This will be variant <strong>${nextLetter.toUpperCase()}</strong> with test_id <span class="mono">${test.name}_${nextLetter}</span>.
          You'll need to redistribute traffic weights after adding.
        </p>

        <div class="form-group">
          <label class="form-label">Page</label>
          <select class="form-select" id="add-variant-page">
            <option value="">Select a page...</option>
            ${State.pages.filter(p => !existingPages.has(p)).map(p => `<option value="${p}">${p}</option>`).join('')}
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Traffic Weight (%)</label>
          <div style="display:flex; align-items:center; gap:8px;">
            <input type="number" class="form-input" id="add-variant-weight" min="1" max="99" value="0" style="width:80px; text-align:center; font-family:var(--mono);">
            <span style="font-size:12px; color:var(--text-secondary);">%</span>
          </div>
          <div class="form-hint">Current total: ${test.variants.reduce((s, v) => s + (v.weight || 0), 0)}%. Adjust existing weights after adding so all variants total 100%.</div>
        </div>

        <div id="add-variant-error" style="color:#991B1B; font-size:13px; margin-top:12px; display:none;"></div>

        <div class="modal-footer">
          <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="modal-add">Add Variant</button>
        </div>
      </div>
    </div>
  `;

  modal.querySelector('#modal-cancel').onclick = () => closeModal();
  modal.querySelector('.modal-overlay').onclick = (e) => {
    if (e.target === e.currentTarget) closeModal();
  };

  modal.querySelector('#modal-add').onclick = async () => {
    const page = modal.querySelector('#add-variant-page').value;
    const weight = parseInt(modal.querySelector('#add-variant-weight').value) || 0;
    const errEl = modal.querySelector('#add-variant-error');

    if (!page) { errEl.textContent = 'Select a page.'; errEl.style.display = 'block'; return; }
    if (weight < 0 || weight > 99) { errEl.textContent = 'Weight must be between 0 and 99.'; errEl.style.display = 'block'; return; }

    errEl.style.display = 'none';
    const addBtn = modal.querySelector('#modal-add');
    addBtn.textContent = 'Adding...';
    addBtn.disabled = true;

    // Get sha if needed
    if (!test._sha) {
      try {
        const res = await fetch(`https://api.github.com/repos/${GitHub.repo}/contents/tests/${test.name}.json`, { headers: GitHub.headers() });
        if (res.ok) test._sha = (await res.json()).sha;
      } catch {}
    }

    const newVariant = {
      id: nextLetter,
      page,
      test_id: `${test.name}_${nextLetter}`,
      weight,
      added: nowISO()
    };

    test.variants.push(newVariant);

    try {
      const cleanTest = { ...test };
      const sha = cleanTest._sha;
      delete cleanTest._sha;
      const newSha = await GitHub.updateTest(cleanTest, sha);
      test._sha = newSha;
      closeModal();
      toast(`Variant ${nextLetter.toUpperCase()} added!`);
      triggerDeploy();
      State.currentTest = test;
      render();
    } catch (err) {
      test.variants.pop();
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      addBtn.textContent = 'Add Variant';
      addBtn.disabled = false;
    }
  };

  setTimeout(() => modal.querySelector('#add-variant-page')?.focus(), 100);
}

function closeModal() {
  const modal = $('#modal-root');
  const overlay = modal.querySelector('.modal-overlay');
  if (overlay) overlay.classList.remove('open');
  setTimeout(() => { modal.innerHTML = ''; }, 150);
}

// ══════════════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════════════
async function init() {
  // Silently load saved token if available
  const token = localStorage.getItem('gh_token');
  if (token) {
    GitHub.token = token;
    GitHub.repo = CLIENT.repo;
    State.readOnly = false;
  }

  // Try loading from deployed site (works without token)
  if (!GitHub.token) {
    const tests = await SiteAPI.listTests();
    if (tests !== null) {
      State.tests = tests;
      State.view = 'dashboard';
      render();
      return;
    }
    // No index file yet and no token — show settings
    State.view = 'settings';
    render();
    return;
  }

  // Have token — full load via GitHub API
  await loadDashboard();
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const modal = $('#modal-root');
    if (modal.innerHTML) { closeModal(); return; }
    const confirm = document.querySelector('.confirm-overlay');
    if (confirm) { confirm.remove(); return; }
    if (State.view === 'detail') { State.view = 'dashboard'; render(); }
  }
});

init();
</script>



<!-- PPC-TRACKING-START -->
<script>
(function(){
  try{
    var dl=window.dataLayer=window.dataLayer||[];
    var cfg=window.__landerConfig||{};

    /* ---------- 1. Parameter capture ---------- */
    var sp=new URLSearchParams(window.location.search);
    sp.forEach(function(v,k){
      try{sessionStorage.setItem('lp_'+k,v)}catch(e){}
    });
    // Enrichment from config
    ['lander','lander_version','test_id'].forEach(function(k){
      if(cfg[k])try{sessionStorage.setItem('lp_'+k,cfg[k])}catch(e){}
    });

    /* Helper: collect all lp_ params */
    function getLpParams(){
      var p={};
      for(var i=0;i<sessionStorage.length;i++){
        var k=sessionStorage.key(i);
        if(k&&k.indexOf('lp_')===0) p[k.slice(3)]=sessionStorage.getItem(k);
      }
      return p;
    }

    function buildUrl(base){
      var p=getLpParams();
      var u=new URL(base);
      Object.keys(p).forEach(function(k){u.searchParams.set(k,p[k])});
      return u.toString();
    }

    /* ---------- 2. CTA interception ---------- */

    /* data-cta links/buttons — turn into real links with params */
    document.addEventListener('click',function(e){
      var el=e.target.closest('[data-cta]');
      if(!el) return;
      e.preventDefault();
      var base=el.getAttribute('data-cta')||cfg.ctaUrl||el.href||'';
      if(base){
        var url=buildUrl(base);
        dl.push({event:'cta_click',cta_url:url});
        window.location.href=url;
      }
    });

    /* Patch showModal — only fires event, does NOT open URL
       (the modal "Proceed to Shop" button handles the actual redirect) */
    if(typeof window.showModal==='function'){
      var _origShow=window.showModal;
      window.showModal=function(){
        dl.push({event:'cta_click',cta_source:'showModal'});
        _origShow.apply(this,arguments);
      };
    }

    /* Rewrite modal confirm buttons into real links with params.
       Replaces the button with an <a> tag styled identically so
       the browser treats it as a real navigation (no popup blocker). */
    document.addEventListener('DOMContentLoaded',function(){
      if(!cfg.ctaUrl) return;
      var url=buildUrl(cfg.ctaUrl);

      /* Find modal confirm buttons — only inside #redirectModal */
      var modalBtns=document.querySelectorAll('#redirectModal button, #redirectModal [onclick*="closeModal"]');
      modalBtns.forEach(function(btn){
        /* Replace button with a real <a> link */
        var a=document.createElement('a');
        a.href=url;
        a.target='_blank';
        a.rel='noopener';
        a.className=btn.className;
        a.innerHTML=btn.innerHTML;
        a.style.cssText=btn.style.cssText+';text-decoration:none;display:inline-block;text-align:center;';
        a.addEventListener('click',function(){
          dl.push({event:'cta_click',cta_url:this.href,cta_source:'modal_confirm'});
          /* Update href at click time in case sessionStorage changed */
          this.href=buildUrl(cfg.ctaUrl);
        });
        btn.parentNode.replaceChild(a,btn);
      });

      /* Also turn the main CTA button (showModal trigger) into a link
         that shows the modal AND has a real href as fallback */
      var ctaBtns=document.querySelectorAll('[onclick*="showModal"]');
      ctaBtns.forEach(function(btn){
        btn.removeAttribute('onclick');
        btn.addEventListener('click',function(e){
          e.preventDefault();
          dl.push({event:'cta_click',cta_source:'showModal'});
          if(typeof _origShow==='function') _origShow();
        });
      });
    });

    /* ---------- 3. Scroll depth ---------- */
    var scrollFired={};
    function checkScroll(){
      var h=document.documentElement.scrollHeight-window.innerHeight;
      if(h<=0) return;
      var pct=Math.round(window.scrollY/h*100);
      [25,50,75,100].forEach(function(t){
        if(pct>=t&&!scrollFired[t]){
          scrollFired[t]=true;
          dl.push({event:'scroll_depth',depth:t});
        }
      });
    }
    window.addEventListener('scroll',checkScroll,{passive:true});

    /* ---------- 4. Time on page ---------- */
    [15,30,60].forEach(function(s){
      setTimeout(function(){
        dl.push({event:'time_on_page',seconds:s});
      },s*1000);
    });

    /* ---------- 5. Page view ---------- */
    dl.push({event:'lander_view',lander:cfg.lander||window.location.pathname});

  }catch(e){/* tracking must never break the page */}
})();
</script>
<!-- PPC-TRACKING-END -->
