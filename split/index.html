<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var testName = params.get('t');
  if (!testName) return;

  // Check for sticky cookie
  var ck = 'ts_' + testName;
  var m = document.cookie.match(new RegExp('(?:^|; )' + ck + '=([^;]+)'));

  var x = new XMLHttpRequest();
  x.open('GET', '/tests/' + testName + '.json', true);
  x.onload = function () {
    if (x.status !== 200) return;
    try {
      var test = JSON.parse(x.responseText);
      var variants = test.variants;
      if (!variants || !variants.length) return;

      // If sticky cookie exists, redirect to that variant
      if (m && m[1]) {
        for (var i = 0; i < variants.length; i++) {
          if (variants[i].id === m[1]) {
            redirect(variants[i]);
            return;
          }
        }
      }

      // Roll dice against weights
      var total = 0;
      for (var i = 0; i < variants.length; i++) total += (variants[i].weight || 0);
      if (total <= 0) { redirect(variants[0]); return; }

      var roll = Math.random() * total;
      var cumulative = 0;
      var chosen = variants[0];
      for (var i = 0; i < variants.length; i++) {
        cumulative += (variants[i].weight || 0);
        if (roll < cumulative) { chosen = variants[i]; break; }
      }

      // Set sticky cookie (24h)
      var exp = new Date(Date.now() + 86400000).toUTCString();
      document.cookie = ck + '=' + chosen.id + '; path=/; expires=' + exp;

      redirect(chosen);
    } catch (e) {}
  };
  x.send();

  function redirect(variant) {
    // Build target URL preserving all query params except 't'
    var base = '/' + variant.page;
    params.delete('t');
    var qs = params.toString();
    if (qs) base += '?' + qs;
    if (window.location.hash) base += window.location.hash;
    window.location.replace(base);
  }
})();
</script>

<script>
(function(){
  try{
    var dl=window.dataLayer=window.dataLayer||[];
    var cfg=window.__landerConfig||{};

    /* ---------- 1. Parameter capture ---------- */
    var sp=new URLSearchParams(window.location.search);
    sp.forEach(function(v,k){
      try{sessionStorage.setItem('lp_'+k,v)}catch(e){}
    });
    // Enrichment from config
    ['lander','lander_version','test_id'].forEach(function(k){
      if(cfg[k])try{sessionStorage.setItem('lp_'+k,cfg[k])}catch(e){}
    });

    /* Helper: collect all lp_ params */
    function getLpParams(){
      var p={};
      for(var i=0;i<sessionStorage.length;i++){
        var k=sessionStorage.key(i);
        if(k&&k.indexOf('lp_')===0) p[k.slice(3)]=sessionStorage.getItem(k);
      }
      return p;
    }

    function buildUrl(base){
      var p=getLpParams();
      var u=new URL(base);
      Object.keys(p).forEach(function(k){u.searchParams.set(k,p[k])});
      return u.toString();
    }

    /* ---------- 2. CTA interception ---------- */

    /* data-cta links/buttons — turn into real links with params */
    document.addEventListener('click',function(e){
      var el=e.target.closest('[data-cta]');
      if(!el) return;
      e.preventDefault();
      var base=el.getAttribute('data-cta')||cfg.ctaUrl||el.href||'';
      if(base){
        var url=buildUrl(base);
        dl.push({event:'cta_click',cta_url:url});
        window.location.href=url;
      }
    });

    /* Patch showModal — only fires event, does NOT open URL
       (the modal "Proceed to Shop" button handles the actual redirect) */
    if(typeof window.showModal==='function'){
      var _origShow=window.showModal;
      window.showModal=function(){
        dl.push({event:'cta_click',cta_source:'showModal'});
        _origShow.apply(this,arguments);
      };
    }

    /* Rewrite modal confirm buttons into real links with params.
       Replaces the button with an <a> tag styled identically so
       the browser treats it as a real navigation (no popup blocker). */
    document.addEventListener('DOMContentLoaded',function(){
      if(!cfg.ctaUrl) return;
      var url=buildUrl(cfg.ctaUrl);

      /* Find modal confirm buttons — only inside #redirectModal */
      var modalBtns=document.querySelectorAll('#redirectModal button, #redirectModal [onclick*="closeModal"]');
      modalBtns.forEach(function(btn){
        /* Replace button with a real <a> link */
        var a=document.createElement('a');
        a.href=url;
        a.target='_blank';
        a.rel='noopener';
        a.className=btn.className;
        a.innerHTML=btn.innerHTML;
        a.style.cssText=btn.style.cssText+';text-decoration:none;display:inline-block;text-align:center;';
        a.addEventListener('click',function(){
          dl.push({event:'cta_click',cta_url:this.href,cta_source:'modal_confirm'});
          /* Update href at click time in case sessionStorage changed */
          this.href=buildUrl(cfg.ctaUrl);
        });
        btn.parentNode.replaceChild(a,btn);
      });

      /* Turn showModal triggers into links that open the modal.
         If the element is an <a> with an existing href, override it
         with the parameterized CTA URL so UTMs pass through. */
      var ctaBtns=document.querySelectorAll('[onclick*="showModal"]');
      ctaBtns.forEach(function(btn){
        btn.removeAttribute('onclick');
        if(btn.tagName==='A' && cfg.ctaUrl){
          btn.href=url;
          btn.target='_blank';
          btn.rel='noopener';
        }
        btn.addEventListener('click',function(e){
          e.preventDefault();
          dl.push({event:'cta_click',cta_source:'showModal'});
          if(typeof _origShow==='function') _origShow();
        });
      });
    });

    /* ---------- 3. Scroll depth ---------- */
    var scrollFired={};
    function checkScroll(){
      var h=document.documentElement.scrollHeight-window.innerHeight;
      if(h<=0) return;
      var pct=Math.round(window.scrollY/h*100);
      [25,50,75,100].forEach(function(t){
        if(pct>=t&&!scrollFired[t]){
          scrollFired[t]=true;
          dl.push({event:'scroll_depth',depth:t});
        }
      });
    }
    window.addEventListener('scroll',checkScroll,{passive:true});

    /* ---------- 4. Time on page ---------- */
    [15,30,60].forEach(function(s){
      setTimeout(function(){
        dl.push({event:'time_on_page',seconds:s});
      },s*1000);
    });

    /* ---------- 5. Page view ---------- */
    dl.push({event:'lander_view',lander:cfg.lander||window.location.pathname});

  }catch(e){/* tracking must never break the page */}
})();
</script>
<!-- PPC-TRACKING-END -->
